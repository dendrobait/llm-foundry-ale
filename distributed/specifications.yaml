# Directory settings
checkpoint_dir: "path/to/the/checkpoint/folder"
train_dataset_dir:
  - "path/to/a/folder/with/jsonl/or/parquet/files"
val_dataset_dir: "path/to/a/folder/with/jsonl/or/parquet/files"
dataset_type: "parquet"
cache_dir: "path/to/the/.cache"

# Data loading settings
pin_memory: true
num_workers_for_dataloader: 32
prefetch_factor: 4
shuffle_dataset: true
additional_mask_token_ids: null

# Model and tokenizer settings
# All architecture parameters (hidden_size, num_layers, etc.) are
# defined in the model config file pointed to by `path_to_model_config`.
path_to_model_config: "path/to/config.json"
base_model: null
tokenizer_name_or_path: "path/to/a/tokenizer"
chat_template_path: null
attn_implementation: "flash_attention_2"
continual_pretraining: false
mfu_type: "dense_transformer"
enable_expert_parallelism: false
use_kernels: false

# Context extension overrides (only relevant for continual pretraining)
new_max_position_embeddings: null
new_rope_theta: null
rope_scale_factor: null

# Training settings
total_batch_size: 2097152
micro_batch_size: 16
eval_micro_batch_size: 8
num_train_epochs: 1
max_steps: 12000
seed: 1337

# Optimizer settings
optimizer_type: "adamw"
max_learning_rate: 0.0007
min_learning_rate: 0.00007
muon_learning_rate: 0.02
warmup_steps: 2000
lr_decay_type: "wsd"
use_sqrt: false
lr_decay_iters_coef: 0.1
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
eps: 0.00000001
max_grad_norm: 1.0

# Precision and optimization settings
# `torch_compile` is slower than `use_liger_kernel`
torch_compile: false
mat_mul_precision: "highest"
tf32: true
bf16: true
gradient_checkpointing: false
use_liger_kernel: true
static_graph: false

# FSDP sharding settings
fsdp_mixed_precision: true
dp_shard: null
full_shard: true
cpu_offload: false
explicit_prefetching: true

# Checkpoint settings
resume_from_checkpoint: null
checkpointing_steps: 1000
begin_new_stage: false
stage_name: "Warmup-Stable-LDecay"

# Hub settings
push_to_hub: false
hub_token: null
hub_model_id: null

# Logging settings
wandb_token: null
wandb_id: "llm-670m-wsd"
wandb_project: "Polyglot"
wandb_desc: "Developing LLMs for low-resource languages."

# Miscellaneous settings
sanity_check: false
sanity_check_num_samples: 100000
